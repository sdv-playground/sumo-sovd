# SOVDd Gateway — aggregates UDS ECUs + vm-mgr SOVD proxy
#
# Architecture:
#   gateway (port 4000)
#     ├── os1 → SOVD proxy to vm-mgr (port 4001)
#     ├── engine_ecu → UDS on vcan1
#     └── body_ecu → UDS on vcan1

[server]
port = 4000

[gateway]
enabled = true
id = "vehicle_gateway"
name = "Vehicle Gateway (multi-ecu sim)"

# =============================================================================
# vm-mgr components via SOVD proxy
# =============================================================================

[proxy.os1]
name = "OS1 VM (vm-mgr)"
url = "http://localhost:4001"
component_id = "os1"

# =============================================================================
# UDS ECUs on vcan1
# =============================================================================

[ecu.engine_ecu]
id = "engine_ecu"
name = "Engine Control Module"

[ecu.engine_ecu.transport]
type = "socketcan"
interface = "vcan1"

[ecu.engine_ecu.transport.isotp]
tx_id = "0x18DA00F1"
rx_id = "0x18DAF100"

[ecu.engine_ecu.session]
transfer_data_block_counter_start = 1
transfer_data_block_counter_wrap = 1

[ecu.engine_ecu.flash]
supports_rollback = true
commit_routine = "0xFF01"
rollback_routine = "0xFF02"

[[ecu.engine_ecu.parameters]]
id = "engine_rpm"
did = "0xF40C"
name = "Engine Speed"
data_type = "uint16"
byte_order = "big"
scale = 0.25
unit = "rpm"

[[ecu.engine_ecu.operations]]
id = "firmware_commit"
name = "Firmware Commit"
rid = "0xFF01"
security_level = 0

[[ecu.engine_ecu.operations]]
id = "firmware_rollback"
name = "Firmware Rollback"
rid = "0xFF02"
security_level = 0

# =============================================================================
# Body Control Module
# =============================================================================

[ecu.body_ecu]
id = "body_ecu"
name = "Body Control Module"

[ecu.body_ecu.transport]
type = "socketcan"
interface = "vcan1"

[ecu.body_ecu.transport.isotp]
tx_id = "0x18DA02F1"
rx_id = "0x18DAF102"

[ecu.body_ecu.session]
transfer_data_block_counter_start = 1
transfer_data_block_counter_wrap = 1

[ecu.body_ecu.flash]
supports_rollback = true
commit_routine = "0xFF01"
rollback_routine = "0xFF02"

[[ecu.body_ecu.parameters]]
id = "battery_voltage"
did = "0xF40C"
name = "Battery Voltage"
data_type = "uint16"
byte_order = "big"
scale = 0.01
unit = "V"

[[ecu.body_ecu.operations]]
id = "firmware_commit"
name = "Firmware Commit"
rid = "0xFF01"
security_level = 0

[[ecu.body_ecu.operations]]
id = "firmware_rollback"
name = "Firmware Rollback"
rid = "0xFF02"
security_level = 0
