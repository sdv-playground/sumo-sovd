# Security Helper — ECU secrets for multi-ecu simulation
#
# Component IDs must match gateway component names.
# XOR algorithm matches both vm-mgr's TestSecurityProvider and
# SOVDd example-ecu's security implementation.

[ecus.os1]
algorithm = "xor"
secret = "ff"

[ecus.engine_ecu]
algorithm = "xor"
secret = "ff"

[ecus.body_ecu]
algorithm = "xor"
secret = "bb"
